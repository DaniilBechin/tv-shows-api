<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Shows API</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f1a; color: #e0e0e0; padding: 20px; }
.container { max-width: 1000px; margin: 0 auto; background: #1a1a2e; padding: 30px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
h1 { margin-bottom: 20px; color: #ffffff; font-size: 28px; font-weight: 600; }
table { width: 100%; border-collapse: separate; border-spacing: 0; margin-bottom: 20px; }
th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #2a2a3e; }
th { background: #16213e; color: #e0e0e0; font-weight: 500; cursor: pointer; user-select: none; }
th:first-child { border-radius: 8px 0 0 0; }
th:last-child { border-radius: 0 8px 0 0; }
th:hover { background: #1a2744; }
th.sorted::after { content: ' ▾'; opacity: 0.5; }
th.sorted.asc::after { content: ' ▴'; opacity: 0.5; }
tr:hover { background: #222240; }
button { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: opacity 0.2s; }
button:hover { opacity: 0.85; }
.btn-edit { background: #3b82f6; color: white; margin-right: 5px; }
.btn-delete { background: #ef4444; color: white; }
.btn-add { background: #3b82f6; color: white; margin-bottom: 20px; padding: 10px 24px; font-size: 15px; border-radius: 20px; }
.btn-add:hover { background: #2563eb; }
.btn-save { background: #22c55e; color: white; }
.btn-cancel { background: #6b7280; color: white; margin-right: 5px; }
.form-section { background: #16213e; padding: 24px; border-radius: 8px; margin-bottom: 20px; display: none; }
.form-section.active { display: block; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #a0a0b0; }
.form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid #2a2a3e; border-radius: 6px; font-size: 14px; background: #0f0f1a; color: #e0e0e0; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #3b82f6; }
.error { color: #ef4444; font-size: 13px; margin-top: 4px; display: none; }
.error.visible { display: block; }
.rating { font-weight: 600; padding: 4px 10px; border-radius: 6px; color: white; font-size: 13px; }
.rating-1 { background: #7f1d1d; }
.rating-2 { background: #7c2d12; }
.rating-3 { background: #854d0e; }
.rating-4 { background: #14532d; }
.rating-5 { background: #064e3b; }
.badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; color: white; }
.badge-explicit { background: #7f1d1d; }
.badge-safe { background: #14532d; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
.modal.active { display: flex; }
.modal-content { background: #1a1a2e; padding: 30px; border-radius: 12px; text-align: center; max-width: 400px; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
.modal-content p { margin-bottom: 20px; font-size: 16px; color: #e0e0e0; }
.modal-content .btn-delete { background: #374151; color: #ef4444; border-radius: 20px; padding: 8px 20px; font-size: 14px; border: 1px solid #ef4444; }
.modal-content .btn-delete:hover { background: #ef4444; color: white; }
.modal-content .btn-cancel { background: #374151; color: #e0e0e0; border-radius: 20px; padding: 8px 20px; font-size: 14px; }
.modal-content .btn-cancel:hover { background: #4b5563; }
.btn-edit { background: #374151; color: #e0e0e0; margin-right: 8px; border-radius: 20px; padding: 6px 16px; font-size: 13px; }
.btn-edit:hover { background: #4b5563; }
.btn-delete { background: #374151; color: #ef4444; border-radius: 20px; padding: 6px 16px; font-size: 13px; border: 1px solid #ef4444; }
.btn-delete:hover { background: #ef4444; color: white; }
.btn-save { background: #22c55e; color: white; border-radius: 20px; padding: 8px 20px; font-size: 14px; }
.btn-save:hover { background: #16a34a; }
.btn-cancel { background: #374151; color: #e0e0e0; border-radius: 20px; padding: 8px 20px; font-size: 14px; }
.btn-cancel:hover { background: #4b5563; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TV Shows</h1>

    <button class="btn-add" id="btn-add">+ Add Show</button>

    <div class="form-section" id="form-section">
      <h2 id="form-title">Add New Show</h2>
      <form id="show-form">
        <input type="hidden" id="show-id">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" required>
          <span class="error" id="name-error">Name is required</span>
        </div>
        <div class="form-group">
          <label for="channel">Channel</label>
          <input type="text" id="channel" required>
          <span class="error" id="channel-error">Channel is required</span>
        </div>
        <div class="form-group">
          <label for="genre">Genre</label>
          <input type="text" id="genre" required>
          <span class="error" id="genre-error">Genre is required</span>
        </div>
        <div class="form-group">
          <label for="rating">Rating (1-5)</label>
          <input type="number" id="rating" min="1" max="5" required>
          <span class="error" id="rating-error">Rating must be between 1 and 5</span>
        </div>
        <div class="form-group">
          <label for="explicit">Explicit</label>
          <select id="explicit">
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </div>
        <button type="submit" class="btn-save">Save</button>
        <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
      </form>
    </div>

    <table>
      <thead>
        <tr>
          <th data-sort="name">Name</th>
          <th data-sort="channel">Channel</th>
          <th data-sort="genre">Genre</th>
          <th data-sort="rating">Rating</th>
          <th>Explicit</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="shows-body"></tbody>
    </table>
  </div>

  <div class="modal" id="delete-modal">
    <div class="modal-content">
      <p>Are you sure you want to delete this show?</p>
      <button class="btn-delete" id="confirm-delete">Delete</button>
      <button class="btn-cancel" id="cancel-delete">Cancel</button>
    </div>
  </div>

  <script>
    const API = '/api/v1/shows';
    const tbody = document.getElementById('shows-body');
    const formSection = document.getElementById('form-section');
    const form = document.getElementById('show-form');
    const formTitle = document.getElementById('form-title');
    const btnAdd = document.getElementById('btn-add');
    const btnCancel = document.getElementById('btn-cancel');
    const deleteModal = document.getElementById('delete-modal');
    const confirmDelete = document.getElementById('confirm-delete');
    const cancelDelete = document.getElementById('cancel-delete');

    let shows = [];
    let sortBy = 'name';
    let sortAsc = true;
    let deleteId = null;

    // Load shows
    async function loadShows() {
      const res = await fetch(API);
      shows = await res.json();
      render();
    }

    // Sort and render
    function render() {
      const sorted = [...shows].sort((a, b) => {
        const aVal = sortBy === 'rating' ? a[sortBy] : (a[sortBy] || '').toString().toLowerCase();
        const bVal = sortBy === 'rating' ? b[sortBy] : (b[sortBy] || '').toString().toLowerCase();
        if (aVal < bVal) return sortAsc ? -1 : 1;
        if (aVal > bVal) return sortAsc ? 1 : -1;
        return 0;
      });

      tbody.innerHTML = sorted.map(show => `
        <tr>
          <td>${show.name}</td>
          <td>${show.channel}</td>
          <td>${show.genre}</td>
          <td><span class="rating rating-${show.rating}">${show.rating}/5</span></td>
          <td><span class="badge ${show.explicit ? 'badge-explicit' : 'badge-safe'}">${show.explicit ? 'Yes' : 'No'}</span></td>
          <td>
            <button class="btn-edit" onclick="editShow(${show.id})">Edit</button>
            <button class="btn-delete" onclick="askDelete(${show.id})">Delete</button>
          </td>
        </tr>
      `).join('');

      document.querySelectorAll('th').forEach(th => {
        th.classList.remove('sorted', 'asc');
        if (th.dataset.sort === sortBy) {
          th.classList.add('sorted');
          if (sortAsc) th.classList.add('asc');
        }
      });
    }

    // Sort handler
    document.querySelectorAll('th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        if (sortBy === th.dataset.sort) sortAsc = !sortAsc;
        else { sortBy = th.dataset.sort; sortAsc = true; }
        render();
      });
    });

    // Add button
    btnAdd.addEventListener('click', () => {
      formTitle.textContent = 'Add New Show';
      form.reset();
      document.getElementById('show-id').value = '';
      formSection.classList.add('active');
      hideErrors();
    });

    // Cancel button
    btnCancel.addEventListener('click', () => {
      formSection.classList.remove('active');
      hideErrors();
    });

    // Edit
    window.editShow = function(id) {
      const show = shows.find(s => s.id === id);
      if (!show) return;
      formTitle.textContent = 'Edit Show';
      document.getElementById('show-id').value = show.id;
      document.getElementById('name').value = show.name;
      document.getElementById('channel').value = show.channel;
      document.getElementById('genre').value = show.genre;
      document.getElementById('rating').value = show.rating;
      document.getElementById('explicit').value = show.explicit;
      formSection.classList.add('active');
      hideErrors();
    };

    // Delete modal
    window.askDelete = function(id) {
      deleteId = id;
      deleteModal.classList.add('active');
    };

    cancelDelete.addEventListener('click', () => {
      deleteModal.classList.remove('active');
      deleteId = null;
    });

    confirmDelete.addEventListener('click', async () => {
      if (!deleteId) return;
      await fetch(`${API}/${deleteId}`, { method: 'DELETE' });
      deleteModal.classList.remove('active');
      deleteId = null;
      loadShows();
    });

    // Validation
    function validate() {
      let valid = true;
      const name = document.getElementById('name').value.trim();
      const channel = document.getElementById('channel').value.trim();
      const genre = document.getElementById('genre').value.trim();
      const rating = parseInt(document.getElementById('rating').value);

      if (!name) { showError('name-error'); valid = false; } else hideError('name-error');
      if (!channel) { showError('channel-error'); valid = false; } else hideError('channel-error');
      if (!genre) { showError('genre-error'); valid = false; } else hideError('genre-error');
      if (!rating || rating < 1 || rating > 5) { showError('rating-error'); valid = false; } else hideError('rating-error');

      return valid;
    }

    function showError(id) { document.getElementById(id).classList.add('visible'); }
    function hideError(id) { document.getElementById(id).classList.remove('visible'); }
    function hideErrors() { document.querySelectorAll('.error').forEach(e => e.classList.remove('visible')); }

    // Submit form
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validate()) return;

      const id = document.getElementById('show-id').value;
      const data = {
        name: document.getElementById('name').value.trim(),
        channel: document.getElementById('channel').value.trim(),
        genre: document.getElementById('genre').value.trim(),
        rating: parseInt(document.getElementById('rating').value),
        explicit: document.getElementById('explicit').value === 'true'
      };

      const method = id ? 'PUT' : 'POST';
      const url = id ? `${API}/${id}` : API;

      await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      formSection.classList.remove('active');
      loadShows();
    });

    // Load on start
    loadShows();
  </script>
</body>
</html>
